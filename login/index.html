<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login & Signup Form - AeroC Admin</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <div class="curved-shape"></div>
        <div class="curved-shape2"></div>

        <div id="message" class="message"></div>

        <div class="form-box Login">
            <h2 class="animation" style="--D:0; --S:21">Login</h2>
            <form id="loginForm" action="#" method="post">
                <div class="input-box animation" style="--D:1; --S:22">
                    <input type="text" name="username" id="loginUsername" required>
                    <label for="loginUsername">Username</label>
                    <box-icon type='solid' name='user' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--D:2; --S:23">
                    <input type="password" name="password" id="loginPassword" required>
                    <label for="loginPassword">Password</label>
                    <box-icon name='lock-alt' type='solid' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--D:3; --S:24">
                    <button class="btn" type="submit">Login</button>
                </div>
                <div class="regi-link animation" style="--D:4; --S:25">
                    <p>Don't have an account? <br> <a href="#" class="SignUpLink">Sign Up</a></p>
                </div>
            </form>
        </div>

        <div class="info-content Login">
            <h2 class="animation" style="--D:0; --S:20">WELCOME BACK!</h2>
            <p class="animation" style="--D:1; --S:21">We are happy to have you with us again. If you need anything, we are here to help.</p>
        </div>

        <div class="form-box Register">
            <h2 class="animation" style="--li:17; --S:0">회원가입</h2>
            <form id="registerForm" action="#" method="post">
                <div class="input-box animation" style="--li:18; --S:1">
                    <input type="text" name="name" id="regName" required placeholder=" ">
                    <label for="regName">이름</label>
                    <box-icon type='solid' name='user' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:18; --S:1">
                    <input type="text" name="username" id="regUsername" required placeholder=" ">
                    <label for="regUsername">아이디</label>
                    <box-icon type='solid' name='user-circle' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:19; --S:2">
                    <input type="password" name="password" id="regPassword" required placeholder=" ">
                    <label for="regPassword">비밀번호</label>
                    <box-icon name='lock-alt' type='solid' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:19; --S:2">
                    <input type="email" name="email" id="regEmail" required placeholder=" ">
                    <label for="regEmail">이메일</label>
                    <box-icon name='envelope' type='solid' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:19; --S:3">
                    <input type="tel" name="phone" id="regPhone" placeholder=" " inputmode="tel" maxlength="14">
                    <label for="regPhone">전화번호</label>
                    <box-icon name='phone' type='solid' color="gray"></box-icon>
                </div>
                <div class="input-box animation" style="--li:20; --S:4">
                    <button class="btn" type="submit">가입하기</button>
                </div>
                <div class="regi-link animation" style="--li:21; --S:5">
                    <p>Already have an account? <br> <a href="#" class="SignInLink">Sign In</a></p>
                </div>
            </form>
        </div>

        <div class="info-content Register">
            <h2 class="animation" style="--li:17; --S:0">WELCOME!</h2>
            <p class="animation" style="--li:18; --S:1">We're delighted to have you here. If you need any assistance, feel free to reach out.</p>
        </div>
    </div>

    <script src="https://unpkg.com/boxicons@2.1.4/dist/boxicons.js"></script>
    <script src="script.js"></script>
</body>
</html>
